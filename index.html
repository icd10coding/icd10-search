    // ==========================================

    window.onload = function() {
        Papa.parse(csvRawData, {
            complete: function(results) {
                processData(results.data);
            },
            header: false,
            skipEmptyLines: true
        });
    };

    function processData(data) {
        allData = [];

        for (let i = 0; i < data.length; i++) {
            let row = data[i];
            if (row.length < 4) continue; 

            let rawPart = row[0] ? row[0].trim().toLowerCase() : "";
            let mappedPart = tabMapping[rawPart] || rawPart; 

            let code = row[2] ? row[2].trim() : "";
            let description = row[3] ? row[3].trim() : "";

            if (!code || !description) continue;

            let analysis = analyzeDescription(description);

            allData.push({
                bodyPart: mappedPart,
                code: code,
                description: description,
                traumaTypes: analysis.traumaTypes, 
                laterality: analysis.laterality,
                loc: analysis.loc 
            });
        }

        if(allData.length > 0) {
            renderTabs();
        } else {
            document.getElementById('dataTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">資料解析失敗，請確認資料格式。</td></tr>';
        }
    }

    function analyzeDescription(desc) {
        let descLower = desc.toLowerCase();
        
        let laterality = "未指定";
        if (descLower.includes("right")) laterality = "右側";
        else if (descLower.includes("left")) laterality = "左側";
        
        let loc = "-";
        if (descLower.includes("without loss of consciousness")) {
            loc = "無";
        } else if (descLower.includes("with loss of consciousness")) {
            loc = "有";
        }
        
        let traumaTypes = [];
        
        if (descLower.includes("closed fracture")) traumaTypes.push("閉鎖性骨折");
        else if (descLower.includes("open fracture")) traumaTypes.push("開放性骨折");
        else if (descLower.includes("fracture")) traumaTypes.push("骨折");

        if (descLower.includes("laceration")) traumaTypes.push("撕裂傷");
        if (descLower.includes("contusion")) traumaTypes.push("挫傷");
        if (descLower.includes("hemorrhage")) traumaTypes.push("出血");
        if (descLower.includes("puncture wound")) traumaTypes.push("穿刺傷");
        if (descLower.includes("blast injury")) traumaTypes.push("爆裂傷");
        if (descLower.includes("open bite")) traumaTypes.push("開放性咬傷");
        if (descLower.includes("edema")) traumaTypes.push("水腫");
        if (descLower.includes("amputation")) traumaTypes.push("截肢");
        if (descLower.includes("crush")) traumaTypes.push("壓傷");
        
        if (traumaTypes.length === 0) traumaTypes.push("其他");
        
        return { traumaTypes, laterality, loc };
    }

    function renderTabs() {
        const tabsContainer = document.getElementById('bodyPartTabs');
        tabsContainer.innerHTML = '';
        
        tabOrder.forEach((part) => {
            let isActive = part === currentBodyPart ? 'active' : '';
            let li = document.createElement('li');
            li.className = 'nav-item';
            li.innerHTML = `<button class="nav-link ${isActive}" data-bs-toggle="tab" onclick="changeTab('${part}')">${part}</button>`;
            tabsContainer.appendChild(li);
        });

        renderTable(); 
    }

    function changeTab(part) {
        currentBodyPart = part;
        renderTabs(); 
    }

    document.getElementById('typeFilter').addEventListener('change', renderTable);
    document.getElementById('lateralityFilter').addEventListener('change', renderTable);
    document.getElementById('locFilter').addEventListener('change', renderTable);
    document.getElementById('searchInput').addEventListener('input', renderTable);

    function renderTable() {
        const typeFilter = document.getElementById('typeFilter').value;
        const latFilter = document.getElementById('lateralityFilter').value;
        const locFilter = document.getElementById('locFilter').value;
        const rawSearchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
        
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = '';

        let filteredData = allData.filter(item => {
            if (currentBodyPart !== "全部部位" && item.bodyPart !== currentBodyPart) return false;
            if (typeFilter && !item.traumaTypes.includes(typeFilter)) return false;
            if (latFilter && item.laterality !== latFilter) return false;
            if (locFilter && item.loc !== locFilter) return false;
            
            if (rawSearchQuery) {
                let searchTerms = rawSearchQuery.split(/\s+/);
                let textToSearch = (item.code + " " + item.description).toLowerCase();
                let isMatch = searchTerms.every(term => textToSearch.includes(term));
                if (!isMatch) return false;
            }

            return true; 
        });

        const lateralityStyles = {
            "右側": "bg-success",           
            "左側": "bg-info text-dark",    
            "未指定": "bg-secondary"        
        };

        filteredData.forEach(item => {
            // 🌟 核心修改：為每一種型態配置專屬顏色，且完全排除黑色 (bg-dark)
            let typeBadges = item.traumaTypes.map(t => {
                let badgeStyle = ''; 
                
                if (t === "開放性骨折")      badgeStyle = 'class="badge bg-danger me-1"'; // 紅色
                else if (t === "閉鎖性骨折") badgeStyle = 'class="badge me-1" style="background-color: #d35400; color: white;"'; // 深橘色
                else if (t === "骨折")       badgeStyle = 'class="badge me-1" style="background-color: #e67e22; color: white;"'; // 淺橘色
                else if (t === "撕裂傷")     badgeStyle = 'class="badge bg-warning text-dark me-1"'; // 黃色
                else if (t === "挫傷")       badgeStyle = 'class="badge bg-primary me-1"'; // 藍色
                else if (t === "出血")       badgeStyle = 'class="badge me-1" style="background-color: #e84393; color: white;"'; // 桃紅色
                else if (t === "穿刺傷")     badgeStyle = 'class="badge bg-success me-1"'; // 綠色
                else if (t === "爆裂傷")     badgeStyle = 'class="badge me-1" style="background-color: #8e44ad; color: white;"'; // 紫色 (取代原黑色)
                else if (t === "開放性咬傷") badgeStyle = 'class="badge me-1" style="background-color: #fd7e14; color: white;"'; // 亮橘色
                else if (t === "水腫")       badgeStyle = 'class="badge bg-info text-dark me-1"'; // 淺藍色
                else if (t === "截肢")       badgeStyle = 'class="badge me-1" style="background-color: #c0392b; color: white;"'; // 深磚紅色 (取代原黑色)
                else if (t === "壓傷")       badgeStyle = 'class="badge bg-secondary me-1"'; // 灰色
                else                        badgeStyle = 'class="badge me-1" style="background-color: #7f8c8d; color: white;"'; // 其他(青灰色)

                return `<span ${badgeStyle}>${t}</span>`;
            }).join('');

            let latClass = lateralityStyles[item.laterality] || "bg-secondary";

            let locBadge = item.loc === "有" ? '<span class="text-danger fw-bold">有</span>' : 
                           item.loc === "無" ? '<span class="text-success">無</span>' : '-';

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="text-secondary fw-bold small">${item.bodyPart}</td>
                <td><code class="text-success fs-5">${item.code}</code></td>
                <td>${typeBadges}</td>
                <td><span class="badge ${latClass}">${item.laterality}</span></td>
                <td class="text-center">${locBadge}</td>
                <td class="small">${item.description}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('rowCount').innerText = filteredData.length;

        if (filteredData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-5">查無符合條件的編碼。</td></tr>';
        }
    }
</script>
